#cloud-config

package_update: true

packages:
  - docker.io
  - docker-compose
  - curl

write_files:

  # =====================================================
  # DOCKER COMPOSE
  # =====================================================

  - path: /opt/guacamole/docker-compose.yml
    permissions: '0644'
    content: |

      version: '3'

      services:

        guacd:
          image: guacamole/guacd
          container_name: guacd
          restart: always

        mysql:
          image: mysql:8
          container_name: guac-mysql
          restart: always

          environment:
            MYSQL_ROOT_PASSWORD: rootpass
            MYSQL_DATABASE: guacamole_db
            MYSQL_USER: guacuser
            MYSQL_PASSWORD: guacpass

          volumes:
            - /opt/guacamole/mysql-data:/var/lib/mysql

        guacamole:
          image: guacamole/guacamole
          container_name: guacamole
          restart: always

          ports:
            - "8080:8080"

          environment:
            MYSQL_HOSTNAME: mysql
            MYSQL_PORT: 3306
            MYSQL_DATABASE: guacamole_db
            MYSQL_USER: guacuser
            MYSQL_PASSWORD: guacpass
            GUACD_HOSTNAME: guacd

          depends_on:
            - mysql
            - guacd

  # =====================================================
  # INIT SCRIPT
  # =====================================================

  - path: /opt/guacamole/init-guac.sh
    permissions: '0755'
    content: |

      #!/bin/bash

      sleep 60

      cd /opt/guacamole

      docker compose up -d

      sleep 30

      docker run --rm guacamole/guacamole \
      /opt/guacamole/bin/initdb.sh --mysql > /opt/guacamole/initdb.sql

      docker exec -i guac-mysql mysql \
      -uroot -prootpass guacamole_db \
      < /opt/guacamole/initdb.sql

runcmd:

  - mkdir -p /opt/guacamole/mysql-data
  - chmod -R 777 /opt/guacamole
  - usermod -aG docker $USER
  - systemctl daemon-reload
  - systemctl enable docker
  - systemctl start docker
  - bash /opt/guacamole/init-guac.sh